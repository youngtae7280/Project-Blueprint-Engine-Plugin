<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevView Work Journal</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          Segoe UI,
          Arial,
          sans-serif;
        background: #f6f7f9;
        color: #20242c;
      }
      body {
        margin: 0;
      }
      header {
        padding: 28px 32px 18px;
        background: #ffffff;
        border-bottom: 1px solid #d7dce3;
      }
      h1 {
        margin: 0;
        font-size: 26px;
        letter-spacing: 0;
      }
      .sub {
        margin-top: 8px;
        color: #5b6472;
        max-width: 880px;
        line-height: 1.5;
      }
      main {
        display: grid;
        grid-template-columns: minmax(260px, 330px) 1fr;
        gap: 18px;
        padding: 18px;
      }
      aside,
      section {
        background: #ffffff;
        border: 1px solid #d7dce3;
        border-radius: 8px;
      }
      aside {
        padding: 14px;
      }
      section {
        padding: 18px;
      }
      button {
        width: 100%;
        text-align: left;
        border: 1px solid #cbd2dc;
        background: #fbfcfd;
        border-radius: 6px;
        padding: 10px;
        cursor: pointer;
      }
      button.active {
        border-color: #2364aa;
        background: #eef5ff;
      }
      .status {
        display: inline-block;
        padding: 3px 7px;
        border-radius: 999px;
        background: #edf0f4;
        font-size: 12px;
      }
      .blocked {
        background: #fff0ed;
        color: #9b2f1f;
      }
      .advisory {
        background: #eef5ff;
        color: #174f8c;
      }
      .timeline {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }
      .step {
        border: 1px solid #d7dce3;
        border-radius: 6px;
        padding: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 10px;
        margin-top: 14px;
      }
      .artifact {
        border: 1px solid #d7dce3;
        border-radius: 6px;
        padding: 10px;
        overflow-wrap: anywhere;
      }
      code {
        font-family: Consolas, monospace;
        font-size: 12px;
      }
      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>DevView Work Journal</h1>
      <div class="sub">
        A static, cumulative journal of DevView work. It summarizes Maintainability Graph context, View Tree, Context
        Pack, Instruction Pack, Evidence, proof/readiness, Graph Delta, guarded update, and audit provenance without
        creating authority.
      </div>
    </header>
    <main>
      <aside>
        <h2>Works</h2>
        <div id="run-list"></div>
      </aside>
      <section>
        <div id="detail"></div>
      </section>
    </main>

    <script>
      const data = JSON.parse(document.getElementById('journal-data').textContent)
      let selected = data.currentRunId
      function esc(value) {
        return String(value ?? '').replace(
          /[&<>"']/g,
          (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char],
        )
      }
      function render() {
        const runs = data.runs || []
        document.getElementById('run-list').innerHTML = runs
          .map(
            (run) =>
              '<button class="' +
              (run.runId === selected ? 'active' : '') +
              '" data-run="' +
              esc(run.runId) +
              '"><strong>' +
              esc(run.title) +
              '</strong><br><span class="status ' +
              esc(run.status) +
              '">' +
              esc(run.status) +
              '</span></button>',
          )
          .join('')
        document.querySelectorAll('[data-run]').forEach((button) =>
          button.addEventListener('click', () => {
            selected = button.getAttribute('data-run')
            render()
          }),
        )
        const run = runs.find((entry) => entry.runId === selected) || runs[0]
        if (!run) return
        document.getElementById('detail').innerHTML =
          '<h2>' +
          esc(run.title) +
          '</h2><p><span class="status ' +
          esc(run.status) +
          '">' +
          esc(run.status) +
          '</span></p><p><strong>Next action:</strong> ' +
          esc(run.nextAction) +
          '</p>' +
          (run.blockedReason ? '<p><strong>Blocked reason:</strong> ' + esc(run.blockedReason) + '</p>' : '') +
          '<h3>Flow Timeline</h3><div class="timeline">' +
          run.flow
            .map(
              (step) =>
                '<div class="step"><strong>' +
                esc(step.label) +
                '</strong><br>' +
                esc(step.summary) +
                '<br><code>' +
                esc(step.status) +
                '</code></div>',
            )
            .join('') +
          '</div><h3>Artifacts / Audit Provenance</h3><div class="grid">' +
          run.artifacts
            .map(
              (artifact) =>
                '<div class="artifact"><strong>' +
                esc(artifact.label) +
                '</strong><br><code>' +
                esc(artifact.path || 'not provided') +
                '</code><br>' +
                esc(artifact.artifactRole || 'no role') +
                '<br><span class="status ' +
                esc(artifact.classification) +
                '">' +
                esc(artifact.classification) +
                '</span></div>',
            )
            .join('') +
          '</div><h3>Safety</h3><p>' +
          esc(data.nonExecutionBoundary) +
          '</p>'
      }
      render()
    </script>
  </body>
</html>
