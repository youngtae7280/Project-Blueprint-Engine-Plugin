name: DevView Read-Model Evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/read-model-evidence.yml
      - cli/src/**
      - scripts/**
      - package.json
      - schemas/**
      - examples/internal-legacy/adoption/todo-search-slice/**
      - examples/valid/todo-app-devview-run/**
      - examples/internal-legacy/read-model-aggregate/**
      - examples/internal-legacy/native/**
      - examples/internal-legacy/retrofit/**
      - examples/README.md
      - outputs/**
      - docs/index.md
      - docs/concept/**

permissions:
  contents: read

jobs:
  todo-search-read-model-evidence:
    name: Read-Model Evidence
    runs-on: ubuntu-latest
    env:
      DEVVIEW_TODO_SEARCH_SLICE: examples/internal-legacy/adoption/todo-search-slice
      DEVVIEW_TODO_SEARCH_GENERATED_DIR: examples/internal-legacy/adoption/todo-search-slice/generated
      DEVVIEW_TODO_APP_SLICE: examples/valid/todo-app-devview-run
      DEVVIEW_TODO_APP_GENERATED_DIR: examples/valid/todo-app-devview-run/generated
      DEVVIEW_AGGREGATE_DIR: examples/internal-legacy/read-model-aggregate/generated
      DEVVIEW_VALIDATE_ALL_OUTPUT: examples/internal-legacy/read-model-aggregate/generated/read-model-validate-all-output.json
      DEVVIEW_CANDIDATE_OBSERVATION_OUTPUT: examples/internal-legacy/read-model-aggregate/generated/read-model-candidate-observation-output.json
      DEVVIEW_AGGREGATE_SLICES: examples/internal-legacy/adoption/todo-search-slice,examples/valid/todo-app-devview-run
      DEVVIEW_E2E_SMOKE_OUTPUT: examples/internal-legacy/read-model-aggregate/generated/read-model-e2e-smoke-output.json
      DEVVIEW_INTENT_NATIVE_GRAPH_SOURCE: examples/internal-legacy/intent-critical/native-pbe-maintenance/graph-source-intent.json
      DEVVIEW_INTENT_NATIVE_PROJECTION: examples/internal-legacy/intent-critical/native-pbe-maintenance/generated/edge-intent-read-model-projection.json
      DEVVIEW_INTENT_NATIVE_OUTPUT: examples/internal-legacy/read-model-aggregate/generated/read-model-edge-intent-native-output.json
      DEVVIEW_INTENT_RETROFIT_GRAPH_SOURCE: examples/internal-legacy/intent-critical/retrofit-pbe-maintenance/graph-source-intent.json
      DEVVIEW_INTENT_RETROFIT_PROJECTION: examples/internal-legacy/intent-critical/retrofit-pbe-maintenance/generated/edge-intent-read-model-projection.json
      DEVVIEW_INTENT_RETROFIT_OUTPUT: examples/internal-legacy/read-model-aggregate/generated/read-model-edge-intent-retrofit-output.json
      DEVVIEW_EDGE_INTENT_OBSERVATION_OUTPUT: examples/internal-legacy/read-model-aggregate/generated/read-model-edge-intent-observation-output.json
      DEVVIEW_HEALTH_REPORT_OUTPUT: examples/internal-legacy/read-model-aggregate/generated/read-model-health-report-output.json
      DEVVIEW_HEALTH_REPORT_MARKDOWN: examples/internal-legacy/read-model-aggregate/generated/read-model-health-report-output.md
      DEVVIEW_COMPILER_BOUNDARY_OUTPUT: examples/internal-legacy/read-model-aggregate/generated/read-model-compiler-boundary-output.json
      DEVVIEW_OPERATION_CHAIN_REPORT: outputs/devview-legacy-operation-chain/operation-chain-report.json
      DEVVIEW_DOGFOOD_EVALUATION_REPORT: outputs/devview-legacy-operation-chain/dogfood-evaluation.json
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build:cli

      - name: Validate all registry-backed read-model Evidence
        run: |
          mkdir -p "$DEVVIEW_AGGREGATE_DIR"
          node dist/cli/index.js graph read-model validate --all --json 2>&1 | tee "$DEVVIEW_VALIDATE_ALL_OUTPUT"

      - name: Observe read-model candidate projections
        run: |
          node dist/cli/index.js graph read-model observe-candidates --json 2>&1 | tee "$DEVVIEW_CANDIDATE_OBSERVATION_OUTPUT"

      - name: Read-model E2E smoke
        run: |
          mkdir -p "$DEVVIEW_AGGREGATE_DIR"
          node scripts/read-model-e2e-smoke.js --output "$DEVVIEW_E2E_SMOKE_OUTPUT"

      - name: Report Compiler Boundary MVP
        run: |
          mkdir -p "$DEVVIEW_AGGREGATE_DIR"
          node dist/cli/index.js graph read-model report-compiler-boundary --json 2>&1 | tee "$DEVVIEW_COMPILER_BOUNDARY_OUTPUT"

      - name: Observe intent-critical edgeIntent projections
        run: |
          mkdir -p "$DEVVIEW_AGGREGATE_DIR"
          mkdir -p "$(dirname "$DEVVIEW_INTENT_NATIVE_PROJECTION")" "$(dirname "$DEVVIEW_INTENT_RETROFIT_PROJECTION")"
          node dist/cli/index.js graph read-model project-intent --graph-source "$DEVVIEW_INTENT_NATIVE_GRAPH_SOURCE" --output "$DEVVIEW_INTENT_NATIVE_PROJECTION" --json 2>&1 | tee "$DEVVIEW_INTENT_NATIVE_OUTPUT"
          node dist/cli/index.js graph read-model project-intent --graph-source "$DEVVIEW_INTENT_RETROFIT_GRAPH_SOURCE" --output "$DEVVIEW_INTENT_RETROFIT_PROJECTION" --json 2>&1 | tee "$DEVVIEW_INTENT_RETROFIT_OUTPUT"
          node <<'NODE'
          const fs = require('node:fs')

          function readJson(filePath) {
            return JSON.parse(fs.readFileSync(filePath, 'utf8').replace(/^\uFEFF/, ''))
          }

          const nativeOutputPath = process.env.DEVVIEW_INTENT_NATIVE_OUTPUT
          const retrofitOutputPath = process.env.DEVVIEW_INTENT_RETROFIT_OUTPUT
          const nativeOutput = readJson(nativeOutputPath)
          const retrofitOutput = readJson(retrofitOutputPath)
          const nativePass = nativeOutput.status === 'intent-projection-pass'
          const retrofitPass = retrofitOutput.status === 'intent-projection-pass'

          const observation = {
            status: nativePass && retrofitPass ? 'edge-intent-projection-pass' : 'edge-intent-projection-blocked',
            edgeIntentProjectionObservationStatus:
              nativePass && retrofitPass ? 'edge-intent-projection-pass' : 'edge-intent-projection-blocked',
            sourceMode: 'intent-critical-edge-intent-projection-observation',
            native: {
              graphSource: process.env.DEVVIEW_INTENT_NATIVE_GRAPH_SOURCE,
              projection: process.env.DEVVIEW_INTENT_NATIVE_PROJECTION,
              output: nativeOutputPath,
              status: nativeOutput.status || 'missing',
              projectedIntentCount: nativeOutput.projectedIntentCount ?? null,
            },
            retrofit: {
              graphSource: process.env.DEVVIEW_INTENT_RETROFIT_GRAPH_SOURCE,
              projection: process.env.DEVVIEW_INTENT_RETROFIT_PROJECTION,
              output: retrofitOutputPath,
              status: retrofitOutput.status || 'missing',
              projectedIntentCount: retrofitOutput.projectedIntentCount ?? null,
            },
            boundary:
              'Intent-critical edgeIntent projection is non-enforcing CI observation only and is not enrolled in broad validate-all intent enforcement.',
          }

          fs.writeFileSync(process.env.DEVVIEW_EDGE_INTENT_OBSERVATION_OUTPUT, `${JSON.stringify(observation, null, 2)}\n`)
          if (observation.status !== 'edge-intent-projection-pass') process.exitCode = 1
          NODE

      - name: Report graph-source transition health
        run: |
          node dist/cli/index.js graph read-model report-health --json --markdown "$DEVVIEW_HEALTH_REPORT_MARKDOWN" 2>&1 | tee "$DEVVIEW_HEALTH_REPORT_OUTPUT"

      - name: Observe DevView legacy operation chain dogfood
        shell: pwsh
        run: |
          ./scripts/invoke-devview-legacy-v0.ps1 -Command operation-chain
          ./scripts/invoke-devview-legacy-v0.ps1 -Command evaluate-dogfood

      - name: Focused read-model Evidence tests
        run: npx vitest run cli/src/__tests__/read-model-evidence.test.ts

      - name: Todo Search runtime fixture tests
        run: npx vitest run "$DEVVIEW_TODO_SEARCH_SLICE/runtime-fixture"

      - name: Validate DevView plugin files
        run: npm run validate:devview

      - name: Validate DevView legacy tree schemas
        run: npm run validate:devview:legacy-tree

      - name: Write CI evidence manifest
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const todoSearchSlice = process.env.DEVVIEW_TODO_SEARCH_SLICE
          const todoSearchGeneratedDir = process.env.DEVVIEW_TODO_SEARCH_GENERATED_DIR
          const todoAppSlice = process.env.DEVVIEW_TODO_APP_SLICE
          const todoAppGeneratedDir = process.env.DEVVIEW_TODO_APP_GENERATED_DIR
          const aggregateDir = process.env.DEVVIEW_AGGREGATE_DIR
          const validateAllOutputPath = process.env.DEVVIEW_VALIDATE_ALL_OUTPUT
          const candidateObservationOutputPath = process.env.DEVVIEW_CANDIDATE_OBSERVATION_OUTPUT
          const e2eSmokeOutputPath = process.env.DEVVIEW_E2E_SMOKE_OUTPUT
          const edgeIntentObservationOutputPath = process.env.DEVVIEW_EDGE_INTENT_OBSERVATION_OUTPUT
          const healthReportOutputPath = process.env.DEVVIEW_HEALTH_REPORT_OUTPUT
          const healthReportMarkdownPath = process.env.DEVVIEW_HEALTH_REPORT_MARKDOWN
          const compilerBoundaryOutputPath = process.env.DEVVIEW_COMPILER_BOUNDARY_OUTPUT
          const operationChainReportPath = process.env.DEVVIEW_OPERATION_CHAIN_REPORT
          const dogfoodEvaluationReportPath = process.env.DEVVIEW_DOGFOOD_EVALUATION_REPORT
          const aggregateSlices = (process.env.DEVVIEW_AGGREGATE_SLICES || '')
            .split(',')
            .map((slice) => slice.trim())
            .filter(Boolean)

          function readJson(filePath) {
            if (!fs.existsSync(filePath)) return null
            return JSON.parse(fs.readFileSync(filePath, 'utf8').replace(/^\uFEFF/, ''))
          }

          const todoSearchValidation = readJson(path.join(todoSearchGeneratedDir, 'read-model-validation-report.json'))
          const todoSearchParity = readJson(path.join(todoSearchGeneratedDir, 'read-model-parity-report.json'))
          const todoAppValidation = readJson(path.join(todoAppGeneratedDir, 'read-model-validation-report.json'))
          const aggregateSummary = readJson(path.join(aggregateDir, 'read-model-aggregate-summary.json'))
          const validateAllOutput = readJson(validateAllOutputPath)
          const candidateObservationOutput = readJson(candidateObservationOutputPath)
          const e2eSmokeOutput = readJson(e2eSmokeOutputPath)
          const edgeIntentObservationOutput = readJson(edgeIntentObservationOutputPath)
          const healthReportOutput = readJson(healthReportOutputPath)
          const compilerBoundaryOutput = readJson(compilerBoundaryOutputPath)
          const operationChainReport = readJson(operationChainReportPath)
          const dogfoodEvaluationReport = readJson(dogfoodEvaluationReportPath)
          const eventName = process.env.GITHUB_EVENT_NAME || 'workflow_dispatch'
          const eventPayload = readJson(process.env.GITHUB_EVENT_PATH || '') || {}
          const pullRequest = eventPayload.pull_request || null
          const isPullRequest = eventName === 'pull_request'
          const triggerMode = isPullRequest ? 'pull_request-informational' : eventName

          const todoSearchPass =
            todoSearchValidation?.status === 'validation-pass' && todoSearchParity?.summary?.status === 'comparison-pass'
          const todoAppPass = todoAppValidation?.status === 'validation-pass'
          const aggregatePass = aggregateSummary?.status === 'aggregate-pass'
          const validateAllStatus = validateAllOutput?.validateAllStatus || validateAllOutput?.status || 'missing'
          const projectionContractStatus = validateAllOutput?.projectionContractStatus || []
          const todoSearchProjectionContract =
            projectionContractStatus.find((entry) => entry.profileId === 'todo-search-selected-slice') || null
          const todoAppProjectionContract =
            projectionContractStatus.find((entry) => entry.profileId === 'todo-app-devview-run-structure-only') || null
          const todoSearchProjectionPass = todoSearchProjectionContract?.status === 'projection-contract-pass'
          const todoAppProjectionPass = todoAppProjectionContract?.status === 'projection-contract-pass'
          const candidateObservationStatus =
            candidateObservationOutput?.candidateObservationStatus || candidateObservationOutput?.status || 'missing'
          const todoAppCandidateObservation =
            candidateObservationOutput?.observedCandidates?.find(
              (entry) => entry.profileId === 'todo-app-devview-run-structure-only',
            ) || null
          const todoAppCandidateObservationPass =
            candidateObservationStatus === 'candidate-observation-pass' &&
            todoAppCandidateObservation?.status === 'projection-contract-pass'
          const e2eSmokeStatus = e2eSmokeOutput?.status || 'missing'
          const e2eSmokePass = e2eSmokeStatus === 'e2e-smoke-pass'
          const edgeIntentProjectionObservationStatus =
            edgeIntentObservationOutput?.edgeIntentProjectionObservationStatus ||
            edgeIntentObservationOutput?.status ||
            'missing'
          const edgeIntentProjectionPass = edgeIntentProjectionObservationStatus === 'edge-intent-projection-pass'
          const healthReportStatus = healthReportOutput?.status || 'missing'
          const healthReportPass = healthReportStatus === 'graph-source-health-pass'
          const compilerBoundaryStatus = compilerBoundaryOutput?.status || 'missing'
          const compilerBoundaryPass = compilerBoundaryStatus === 'compiler-boundary-mvp-pass'
          const operationChainStatus = operationChainReport?.status || 'missing'
          const operationChainPass = operationChainStatus === 'devview-legacy-operation-chain-pass'
          const dogfoodEvaluationStatus = dogfoodEvaluationReport?.status || 'missing'
          const dogfoodEvaluationPass = dogfoodEvaluationStatus === 'devview-legacy-dogfood-evaluation-pass'
          const status =
            todoSearchPass &&
            todoAppPass &&
            aggregatePass &&
            validateAllStatus === 'aggregate-pass' &&
            todoSearchProjectionPass &&
            todoAppProjectionPass &&
            todoAppCandidateObservationPass &&
            e2eSmokePass &&
            edgeIntentProjectionPass &&
            healthReportPass &&
            compilerBoundaryPass &&
            operationChainPass &&
            dogfoodEvaluationPass
              ? 'ci-evidence-pass'
              : 'ci-evidence-blocked'

          const manifest = {
            version: '1.0',
            evidenceLevel: 'ci-backed',
            workflowName: process.env.GITHUB_WORKFLOW || 'DevView Read-Model Evidence',
            eventName,
            triggerMode,
            runId: process.env.GITHUB_RUN_ID || 'unavailable',
            runAttempt: process.env.GITHUB_RUN_ATTEMPT || 'unavailable',
            sourceCommit: process.env.GITHUB_SHA || 'unavailable',
            sourceRef: process.env.GITHUB_REF || 'unavailable',
            pr: isPullRequest
              ? {
                  number: pullRequest?.number ?? eventPayload.number ?? null,
                  headSha: pullRequest?.head?.sha || 'unavailable',
                  baseSha: pullRequest?.base?.sha || 'unavailable',
                  headRef: pullRequest?.head?.ref || 'unavailable',
                  baseRef: pullRequest?.base?.ref || 'unavailable',
                }
              : null,
            sourceSlice: todoSearchSlice,
            sourceMode: 'registry-backed validate-all',
            includedSlices: aggregateSlices,
            validateAllStatus,
            candidateObservationStatus,
            e2eSmokeStatus,
            edgeIntentProjectionObservationStatus,
            healthReportStatus,
            compilerBoundaryStatus,
            operationChainStatus,
            dogfoodEvaluationStatus,
            generatedAt: new Date().toISOString(),
            status,
            todoSearch: {
              sourceSlice: todoSearchSlice,
              validatorStatus: todoSearchValidation?.status || 'missing',
              parityStatus: todoSearchParity?.summary?.status || 'missing',
              projectionContractStatus: todoSearchProjectionContract?.status || 'missing',
              graphSourceProjection: {
                graphSource: `${todoSearchSlice}/graph-source.json`,
                projection: `${todoSearchGeneratedDir}/graph-source-read-model-projection.json`,
                status: todoSearchProjectionContract?.status || 'missing',
              },
              checkCount: todoSearchValidation?.summary?.checkCount ?? null,
              nodeCount: todoSearchValidation?.sliceValidationContract?.expectedCounts?.nodes ?? null,
              edgeCount: todoSearchValidation?.sliceValidationContract?.expectedCounts?.edges ?? null,
            },
            todoAppDevviewRun: {
              sourceSlice: todoAppSlice,
              validatorStatus: todoAppValidation?.status || 'missing',
              parityStatus: todoAppValidation?.sliceValidationContract?.requirements?.parity?.status || 'not-required',
              projectionContractStatus: todoAppProjectionContract?.status || 'missing',
              candidateObservationStatus: todoAppCandidateObservation?.status || 'missing',
              graphSourceProjection: {
                graphSource: `${todoAppSlice}/graph-source.json`,
                projection: `${todoAppGeneratedDir}/graph-source-read-model-projection.json`,
                status: todoAppProjectionContract?.status || 'missing',
                observationStatus: todoAppCandidateObservation?.status || 'missing',
                contractMode: 'structure-only-confirmed',
              },
              checkCount: todoAppValidation?.summary?.checkCount ?? null,
              nodeCount: todoAppValidation?.sliceValidationContract?.expectedCounts?.nodes ?? null,
              edgeCount: todoAppValidation?.sliceValidationContract?.expectedCounts?.edges ?? null,
            },
            aggregate: {
              status: aggregateSummary?.status || 'missing',
              includedSliceCount: aggregateSummary?.includedSliceCount ?? aggregateSlices.length,
              includedSlices: aggregateSummary?.includedSlices || aggregateSlices,
              sourceMode: 'registry-backed validate-all',
              artifactPaths: [
                `${aggregateDir}/read-model-aggregate-summary.json`,
                `${aggregateDir}/read-model-aggregate-summary.md`,
              ],
            },
            validatorStatus: todoSearchValidation?.status || 'missing',
            parityStatus: todoSearchParity?.summary?.status || 'missing',
            validateAllStatus,
            candidateObservationStatus,
            e2eSmokeStatus,
            e2eSmoke: {
              status: e2eSmokeStatus,
              artifactPath: e2eSmokeOutputPath,
              summary: e2eSmokeOutput || null,
            },
            edgeIntentProjectionObservation: {
              status: edgeIntentProjectionObservationStatus,
              sourceMode: 'intent-critical-edge-intent-projection-observation',
              artifactPath: edgeIntentObservationOutputPath,
              native: edgeIntentObservationOutput?.native || null,
              retrofit: edgeIntentObservationOutput?.retrofit || null,
              validateAllBoundary:
                'Intent-critical edgeIntent projections are observed separately and are not broad validate-all intent enforcement.',
            },
            healthReport: {
              status: healthReportStatus,
              artifactPath: healthReportOutputPath,
              markdownArtifactPath: healthReportMarkdownPath,
              validateAll: healthReportOutput?.validateAll || null,
              edgeIntent: healthReportOutput?.edgeIntent || null,
              treeNativeRetirement: healthReportOutput?.treeNativeRetirement || null,
              enforcementStatus: healthReportOutput?.enforcementStatus || 'missing',
              nonEnforcementStatement: healthReportOutput?.nonEnforcementStatement || null,
              requiredCheckBoundary: healthReportOutput?.requiredCheckBoundary || null,
            },
            compilerBoundary: {
              status: compilerBoundaryStatus,
              artifactPath: compilerBoundaryOutputPath,
              taskRegistryStatus: compilerBoundaryOutput?.taskRegistryStatus || 'missing',
              contractSchemaStatus: compilerBoundaryOutput?.contractSchemaStatus || 'missing',
              contractValidatorStatus: compilerBoundaryOutput?.contractValidatorStatus || 'missing',
              dryRunContractStatus: compilerBoundaryOutput?.dryRunContractStatus || 'missing',
              dryRunContract: compilerBoundaryOutput?.dryRunContract || null,
              nonEnforcementStatement: compilerBoundaryOutput?.nonEnforcementStatement || null,
              aiBoundary: compilerBoundaryOutput?.aiBoundary || null,
              compilerBoundary: compilerBoundaryOutput?.compilerBoundary || null,
              humanDecisionBoundary: compilerBoundaryOutput?.humanDecisionBoundary || null,
            },
            devviewLegacyOperationChain: {
              status: operationChainStatus,
              artifactPath: operationChainReportPath,
              operationChain: operationChainReport?.operationChain || null,
              checks: operationChainReport?.checks || null,
              graphSourceStatuses: operationChainReport?.graphSourceStatuses || null,
              instructionPackStatuses: operationChainReport?.instructionPackStatuses || null,
              graphDeltaStatuses: operationChainReport?.graphDeltaStatuses || null,
              boundaries: operationChainReport?.boundaries || null,
              sourceMode:
                'non-enforcing CI observation for graph-source -> instruction pack -> local change -> graph delta dogfood',
            },
            devviewLegacyDogfoodEvaluation: {
              status: dogfoodEvaluationStatus,
              artifactPath: dogfoodEvaluationReportPath,
              score: dogfoodEvaluationReport?.score || null,
              criteria: dogfoodEvaluationReport?.criteria || [],
              boundaries: dogfoodEvaluationReport?.boundaries || null,
              sourceMode: 'non-enforcing CI observation for operation-chain dogfood criteria',
            },
            candidateObservation: {
              status: candidateObservationStatus,
              sourceMode: 'candidate-observation-only',
              observedCandidates: candidateObservationOutput?.observedCandidates || [],
              artifactPath: candidateObservationOutputPath,
              positiveValidateAllBoundary:
                'Candidate observation is retained as separate CI artifact metadata. The Todo App graph-source projection is also checked by positive validate-all as confirmed structure-only Evidence.',
            },
            projectionContractStatus,
            aggregateStatus: aggregateSummary?.status || 'missing',
            counts: {
              todoSearchValidationWarnings: todoSearchValidation?.summary?.warningCount ?? null,
              todoSearchValidationBlocking: todoSearchValidation?.summary?.blockingCount ?? null,
              todoSearchValidationDecisionRequired: todoSearchValidation?.summary?.decisionRequiredCount ?? null,
              todoSearchParityMismatches: todoSearchParity?.summary?.mismatchCount ?? null,
              todoSearchParityBlocking: todoSearchParity?.summary?.blockingCount ?? null,
              todoSearchParityDecisionRequired: todoSearchParity?.summary?.decisionRequiredCount ?? null,
              todoAppValidationWarnings: todoAppValidation?.summary?.warningCount ?? null,
              todoAppValidationBlocking: todoAppValidation?.summary?.blockingCount ?? null,
              todoAppValidationDecisionRequired: todoAppValidation?.summary?.decisionRequiredCount ?? null,
              aggregateWarnings: aggregateSummary?.summary?.warningCount ?? null,
              aggregateBlocking: aggregateSummary?.summary?.blockingCount ?? null,
              aggregateDecisionRequired: aggregateSummary?.summary?.decisionRequiredCount ?? null,
            },
            artifactPaths: [
              `${todoSearchGeneratedDir}/generated-read-model.json`,
              `${todoSearchGeneratedDir}/generated-read-model.md`,
              `${todoSearchGeneratedDir}/read-model-evidence-manifest.json`,
              `${todoSearchGeneratedDir}/read-model-parity-report.json`,
              `${todoSearchGeneratedDir}/read-model-parity-report.md`,
              `${todoSearchGeneratedDir}/read-model-validation-report.json`,
              `${todoSearchGeneratedDir}/read-model-validation-report.md`,
              `${todoSearchGeneratedDir}/scoped-source-authority-pilot-marker.json`,
              `${todoSearchGeneratedDir}/graph-source-read-model-projection.json`,
              `${todoAppGeneratedDir}/generated-read-model.json`,
              `${todoAppGeneratedDir}/generated-read-model.md`,
              `${todoAppGeneratedDir}/read-model-evidence-manifest.json`,
              `${todoAppGeneratedDir}/read-model-validation-report.json`,
              `${todoAppGeneratedDir}/read-model-validation-report.md`,
              `${todoAppGeneratedDir}/graph-source-read-model-projection.json`,
              `${aggregateDir}/read-model-aggregate-summary.json`,
              `${aggregateDir}/read-model-aggregate-summary.md`,
              validateAllOutputPath,
              candidateObservationOutputPath,
              e2eSmokeOutputPath,
              edgeIntentObservationOutputPath,
              process.env.DEVVIEW_INTENT_NATIVE_OUTPUT,
              process.env.DEVVIEW_INTENT_NATIVE_PROJECTION,
              process.env.DEVVIEW_INTENT_RETROFIT_OUTPUT,
              process.env.DEVVIEW_INTENT_RETROFIT_PROJECTION,
              healthReportOutputPath,
              healthReportMarkdownPath,
              compilerBoundaryOutputPath,
              operationChainReportPath,
              dogfoodEvaluationReportPath,
            ],
            sourceAuthorityBoundary:
              'CI-backed Evidence is Evidence only for declared read-model reports, aggregate summary, and separate candidate-observation metadata. Todo Search remains the only scoped pilot; Todo App DevView Run remains structure-only. This workflow does not expand source authority.',
            nonEnforcementStatement:
              'This workflow is non-enforcing Evidence only. workflow_dispatch runs are manual Evidence runs; pull_request runs, when present, are informational signals only. It is not configured as a required check, branch protection rule, merge gate, or CI enforcement mode.',
            nonPromotionStatement:
              'This workflow is non-enforcing and does not approve full Graph-source promotion, tree-native retirement, public-doc cleanup, or user acceptance.',
            retainedWarningsRemainVisible: true,
          }

          fs.mkdirSync(todoSearchGeneratedDir, { recursive: true })
          fs.writeFileSync(
            path.join(todoSearchGeneratedDir, 'read-model-ci-evidence-manifest.json'),
            `${JSON.stringify(manifest, null, 2)}\n`,
          )
          NODE

      - name: Write evidence summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const summaryPath = process.env.GITHUB_STEP_SUMMARY
          if (!summaryPath) process.exit(0)

          const generatedDir = process.env.DEVVIEW_TODO_SEARCH_GENERATED_DIR
          const manifestPath = path.join(generatedDir, 'read-model-ci-evidence-manifest.json')
          let manifest = null
          if (fs.existsSync(manifestPath)) {
            manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8').replace(/^\uFEFF/, ''))
          }

          const status = manifest?.status || 'ci-evidence-blocked'
          const triggerMode = manifest?.triggerMode || 'unknown'
          const pr = manifest?.pr || null
          const todoSearchStatus = manifest?.todoSearch?.validatorStatus || 'missing'
          const todoSearchParity = manifest?.todoSearch?.parityStatus || 'missing'
          const todoAppStatus = manifest?.todoAppDevviewRun?.validatorStatus || 'missing'
          const aggregateStatus = manifest?.aggregate?.status || 'missing'
          const validateAllStatus = manifest?.validateAllStatus || 'missing'
          const e2eSmokeStatus = manifest?.e2eSmokeStatus || 'missing'
          const todoSearchProjection = manifest?.todoSearch?.projectionContractStatus || 'missing'
          const todoAppProjection = manifest?.todoAppDevviewRun?.projectionContractStatus || 'missing'
          const candidateObservationStatus = manifest?.candidateObservationStatus || 'missing'
          const todoAppCandidateObservation = manifest?.todoAppDevviewRun?.candidateObservationStatus || 'missing'
          const edgeIntentProjectionObservationStatus = manifest?.edgeIntentProjectionObservationStatus || 'missing'
          const healthReportStatus = manifest?.healthReportStatus || 'missing'
          const healthReportMarkdown = manifest?.healthReport?.markdownArtifactPath || 'missing'
          const healthValidateAll = manifest?.healthReport?.validateAll?.aggregateStatus || 'missing'
          const healthEdgeIntent = manifest?.healthReport?.edgeIntent?.status || 'missing'
          const healthEdgeIntentCount = manifest?.healthReport?.edgeIntent?.edgeIntentCount ?? 'missing'
          const healthRetirement = manifest?.healthReport?.treeNativeRetirement?.readinessStatus || 'missing'
          const healthEnforcement = manifest?.healthReport?.enforcementStatus || 'missing'
          const compilerBoundaryStatus = manifest?.compilerBoundaryStatus || 'missing'
          const compilerTaskRegistry = manifest?.compilerBoundary?.taskRegistryStatus || 'missing'
          const compilerContractSchema = manifest?.compilerBoundary?.contractSchemaStatus || 'missing'
          const compilerContractValidator = manifest?.compilerBoundary?.contractValidatorStatus || 'missing'
          const compilerDryRun = manifest?.compilerBoundary?.dryRunContractStatus || 'missing'
          const operationChainStatus = manifest?.operationChainStatus || 'missing'
          const dogfoodEvaluationStatus = manifest?.dogfoodEvaluationStatus || 'missing'
          const includedSlices = manifest?.includedSlices || []

          const markdown = [
            '# DevView Read-Model Evidence',
            '',
            `- Trigger mode: \`${triggerMode}\``,
            pr?.number ? `- PR: #${pr.number} (${pr.headRef}@${pr.headSha} -> ${pr.baseRef}@${pr.baseSha})` : null,
            `- Evidence scope: \`${includedSlices.join(', ')}\``,
            `- CI evidence status: \`${status}\``,
            `- Todo Search validator status: \`${todoSearchStatus}\``,
            `- Todo Search parity status: \`${todoSearchParity}\``,
            `- Todo App DevView Run validator status: \`${todoAppStatus}\``,
            `- Validate-all status: \`${validateAllStatus}\``,
            `- E2E smoke status: \`${e2eSmokeStatus}\``,
            `- Todo Search projection contract status: \`${todoSearchProjection}\``,
            `- Todo App positive projection contract status: \`${todoAppProjection}\``,
            `- Candidate observation status: \`${candidateObservationStatus}\``,
            `- Todo App observed projection status: \`${todoAppCandidateObservation}\``,
            `- edgeIntent projection observation status: \`${edgeIntentProjectionObservationStatus}\``,
            `- Graph-source health report status: \`${healthReportStatus}\``,
            `- Graph-source health report Markdown: \`${healthReportMarkdown}\``,
            `- Health validate-all aggregate: \`${healthValidateAll}\``,
            `- Health edgeIntent status/count: \`${healthEdgeIntent}\` / \`${healthEdgeIntentCount}\``,
            `- Health retirement readiness: \`${healthRetirement}\``,
            `- Health enforcement status: \`${healthEnforcement}\``,
            `- Compiler Boundary MVP status: \`${compilerBoundaryStatus}\``,
            `- Compiler task registry: \`${compilerTaskRegistry}\``,
            `- Execution contract schema: \`${compilerContractSchema}\``,
            `- Execution contract validator: \`${compilerContractValidator}\``,
            `- Dry-run execution contract: \`${compilerDryRun}\``,
            `- DevView legacy operation-chain status: \`${operationChainStatus}\``,
            `- DevView legacy dogfood evaluation status: \`${dogfoodEvaluationStatus}\``,
            `- Aggregate status: \`${aggregateStatus}\``,
            '- Boundary: CI-backed Evidence is Evidence only.',
            '- Candidate observation is retained as separate report-only metadata.',
            '- edgeIntent projection observation is retained as separate report-only metadata.',
            '- Informational only for pull requests.',
            '- Not a required check or branch protection rule.',
            '- No source authority change.',
            '- No full Graph-source promotion.',
            '- No enforcement is introduced by this workflow.',
            '- Retained warnings remain visible in generated reports.',
            '',
          ]
            .filter(Boolean)
            .join('\n')

          fs.appendFileSync(summaryPath, markdown)
          NODE

